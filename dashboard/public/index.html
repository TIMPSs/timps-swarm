<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TIMPS Swarm Control</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body {
      background: #050a14;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1626; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
</body>
</html>
